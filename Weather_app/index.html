<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Weather App</title>
  </head>
  <body>
    <div class="city-and-searchBar">
      <div>
        <h1 id="city">City<span> , </span><h1 id="country">Country</h1></h1>
        <div>
          <p id="date-and-time">day</p>
        </div>
      </div>

      <div class="search-bar">
        <input id="input-field" type="text" placeholder="Enter city name" />
        <button id="button-field" type="button">Search</button>
      </div>
    </div>

    <div class="temperature-and-condition">
      <div class="only-temperature">
        <div>
        <h1 id="temperature">0</h1>
        </div>
        <div>
          <p class="convert-inline1">°C | </p>
          <p class="convert-inline2">°F</p>
          <p id="weather-status">cloudy Weather</p>
        </div>
      </div>

      <div class="weather-condition">
        <div>
          <img id="weather-img" src="#" alt="" />
        </div>
        <div class="weather-detail">
          <span>Feels like: <span id="feels-like"></span></span><br>
          <span>Humidity: <span id="humidity"></span></span><br>
          <span>Wind: <span  id="wind-speed"></span></span>
        </div>
      </div>
    </div>

    <div class="main-container">

      <div class="weekend-days">
        <p id="day-name1">Sunday</p>
        <img id="weather" src="" alt="">
        <small>20°<small> - 30</small></small>
        <p id="weather-condition1">Clear</p>
      </div>

      <div class="weekend-days">
        <p id="day-name1">Sunday</p>
        <img id="weather" src="" alt="">
        <small>20°<small> - 30</small></small>
        <p id="weather-condition1">Clear</p>
      </div>

      <div class="weekend-days">
        <p id="day-name1">Sunday</p>
        <img id="weather" src="" alt="">
        <small>20°<small> - 30</small></small>
        <p id="weather-condition1">Clear</p>
      </div>

      <div class="weekend-days">
        <p id="day-name1">Sunday</p>
        <img id="weather" src="" alt="">
        <small>20°<small> - 30</small></small>
        <p id="weather-condition1">Clear</p>
      </div>

      <div class="weekend-days">
        <p id="day-name1">Sunday</p>
        <img id="weather" src="" alt="">
        <small>20°<small> - 30</small></small>
        <p id="weather-condition1">Clear</p>
      </div>

      <div class="weekend-days">
        <p id="day-name1">Sunday</p>
        <img id="weather" src="" alt="">
        <small>20°<small> - 30</small></small>
        <p id="weather-condition1">Clear</p>
      </div>
      
    </div>

    <script src="script.js"></script>
  </body>
</html>
