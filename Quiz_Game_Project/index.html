<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz Game</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container" id="container">

      <!-- Start Screen  -->
      <div class="screen active" id="start-screen">
        <h1>Quiz Time</h1>
        <p>Test your knowledge with these fun question</p>
        <button type="button" id="start-quiz">Start quiz</button>
      </div>

      <!-- Quiz Question Screen -->
      <div class="screen" id="quiz-questions">
        <p class="question-statement">What is your name</p>
        <div class="quiz-info" id="quiz-info">
          <p>Question <span id="current-question"></span> of <span id="max-questions"></span></p>
          <p>Score: <span id="score">0</span></p>
        </div>

        <div class="answer-container" id="answer-container">
          
        </div>

        <div class="progress-bar" id="progress-bar">
          <div class="progress" id="progress"></div>
        </div>
      </div>

      <!-- Result Screen -->
      <div class="screen" id="result-screen">
        <h1>Quiz Result</h1>
        <div class="score-showing" id="score-showing">
          <p>
            You scored <span id="obtained-score"></span> out of <span>5</span>
          </p>
          <div id="result-message">Good effects! Keep Learning!</div>
        </div>
        <button type="button" id="restart-btn">Restart Quiz</button>
      </div>

    </div>
    <script src="script.js"></script>
  </body>
</html>
