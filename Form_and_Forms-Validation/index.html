<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="form-container">
      <h3 class="form-title">Login or SignUp</h3>

      <form novalidate class="login-form">
        <div>
          <input
            type="email" class="input-fields" id="loginemail" placeholder="Email address or phone number"/>
          <input
            type="password" class="input-fields" id="loginpassword" placeholder="Password"/>
        </div>

        <div class="login-anchor-tag">
          <a href="#" id="login">Login</a>
        </div>
        <div class="password-anchor-tag">
          <a href="#" id="forgetten-password">Forgetten password?</a>
        </div>
        <div class="new-account-anchor-tag">
          <a href="#" id="create-Newaccount">Create new account</a>
        </div>
      </form>
    </div>

    <!-- For LogIn Screen -->

    <div id="loginsuccessful">
      
      <h1>Login Successful ✔</h1>
    </div>

    <script src="script.js"></script>
  </body>
</html>
